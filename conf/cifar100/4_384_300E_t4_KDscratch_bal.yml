# Scratch training (CIFAR100) + Router self-KD (balanced)
# - Teacher: last block router distribution
# - Students: blocks[0..L-2] routers match teacher
#
# Based on: conf/cifar100/4_384_300E_t4.yml

# Dataset / Model parameters
data_dir: /dataset/CIFAR100
dataset: torch/cifar100
pretrained: False
num_classes: 100
num_heads: 12
img_size: 32
mean:
  - 0.5071
  - 0.4867
  - 0.4408
std:
  - 0.2675
  - 0.2565
  - 0.2761
crop_pct: 1.0
scale: [1.0, 1.0]
ratio: [1.0, 1.0]
interpolation: bicubic
train_interpolation: bicubic
pooling_stat: "0011"
time_steps: 4
layer: 4
dim: 384
mlp_ratio: 4.0

# MoE
num_experts: 4
expert_timesteps: [4, 1, 1, 1]

# Augmentation & regularization parameters
aa: rand-m9-n1-mstd0.4-inc1
color_jitter: 0.5
mixup: 0.5
mixup_off_epoch: 200
mixup_prob: 1.0
mixup_mode: batch
mixup_switch_prob: 0.5
cutmix: 0.0

# Model Exponential Moving Average
model-ema: False
model-ema-decay: 0.9998

# Optim / schedule (scratch baseline)
seed: 42
amp: False
channels_last: False
batch_size: 128
val_batch_size: 128
opt: adamw
lr: 1e-3
min_lr: 1e-5
sched: cosine
weight_decay: 6e-2
epochs: 300
cooldown_epochs: 10
warmup_epochs: 20
warmup_lr: 1e-6
smoothing: 0.1
workers: 8

# Router self-KD (balanced for scratch)
# - Keep KD relatively gentle early via warmup
router_kd: true
router_kd_weight: 0.3
router_kd_temp: 3.0
router_kd_warmup: linear
router_kd_warmup_epochs: 30

